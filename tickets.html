<script>
const tickets = [
  { id:"TKT-000124", title:"Disable SMBv1 on File Server", tag:"Remediation", customer:"Acme Manufacturing", priority:"High", status:"In Progress", assigned:"Alex Johnson", sla:"2h left", updated:"15m ago" },
  { id:"TKT-000123", title:"Patch OpenSSL CVE-2024-3094", tag:"Vulnerability", customer:"Orlando Law Group", priority:"Critical", status:"Open", assigned:"Maria Garcia", sla:"Overdue", updated:"42m ago" },
  { id:"TKT-000122", title:"Backup Validation Failure", tag:"Backup", customer:"Stellar IT", priority:"Medium", status:"Pending Customer", assigned:"James Lee", sla:"1d left", updated:"1h ago" },
  { id:"TKT-000121", title:"Brute Force Attack Detected", tag:"Security Alert", customer:"Acme Manufacturing", priority:"High", status:"In Progress", assigned:"Sarah Kim", sla:"3h left", updated:"2h ago" },
  { id:"TKT-000120", title:"Malicious File Detected", tag:"Security Alert", customer:"Orlando Law Group", priority:"Critical", status:"In Progress", assigned:"David Chen", sla:"30m left", updated:"2h ago" },
  { id:"TKT-000119", title:"MFA Not Enforced on O365", tag:"Configuration", customer:"Acme Manufacturing", priority:"Medium", status:"Open", assigned:"Alex Johnson", sla:"2d left", updated:"3h ago" },
  { id:"TKT-000118", title:"Unapproved Software Found", tag:"Compliance", customer:"Stellar IT", priority:"Low", status:"In Progress", assigned:"Maria Garcia", sla:"3d left", updated:"5h ago" },
  { id:"TKT-000117", title:"Firewall Rule Review", tag:"Review", customer:"Orlando Law Group", priority:"Medium", status:"Pending Customer", assigned:"James Lee", sla:"4d left", updated:"6h ago" },
  { id:"TKT-000116", title:"Critical Windows Updates", tag:"Patch Management", customer:"Acme Manufacturing", priority:"High", status:"Open", assigned:"Sarah Kim", sla:"1d left", updated:"8h ago" },
  { id:"TKT-000115", title:"Phishing Email Reported", tag:"Phishing", customer:"Stellar IT", priority:"Low", status:"Resolved", assigned:"David Chen", sla:"-", updated:"1d ago" }
];

let currentPage = 1;
const rowsPerPage = 10;

const tableBody = document.querySelector("tbody");
const allInputs = document.querySelectorAll("input");
const topSearch = document.querySelector(".search-top");
const tableSearch = document.querySelector(".filters input");
const selects = document.querySelectorAll(".filters select");

const statusFilter = selects[0];
const priorityFilter = selects[1];
const customerFilter = selects[2];
const assignedFilter = selects[3];

function populateFilters(){
  statusFilter.innerHTML = `<option value="">Status</option>` + [...new Set(tickets.map(t=>t.status))].map(v=>`<option value="${v}">${v}</option>`).join("");
  priorityFilter.innerHTML = `<option value="">Priority</option>` + [...new Set(tickets.map(t=>t.priority))].map(v=>`<option value="${v}">${v}</option>`).join("");
  customerFilter.innerHTML = `<option value="">Customer</option>` + [...new Set(tickets.map(t=>t.customer))].map(v=>`<option value="${v}">${v}</option>`).join("");
  assignedFilter.innerHTML = `<option value="">Assigned To</option>` + [...new Set(tickets.map(t=>t.assigned))].map(v=>`<option value="${v}">${v}</option>`).join("");
}

function priorityClass(priority){
  return priority.toLowerCase();
}

function statusClass(status){
  if(status === "In Progress") return "progress";
  if(status === "Pending Customer") return "pending";
  if(status === "Resolved") return "resolved";
  return "open";
}

function slaClass(sla){
  if(sla === "Overdue" || sla.includes("30m")) return "sla-bad";
  if(sla === "-") return "";
  return "sla-warn";
}

function filteredTickets(){
  const searchValue = (tableSearch.value || topSearch.value || "").toLowerCase();

  return tickets.filter(t => {
    const matchesSearch =
      t.id.toLowerCase().includes(searchValue) ||
      t.title.toLowerCase().includes(searchValue) ||
      t.customer.toLowerCase().includes(searchValue) ||
      t.priority.toLowerCase().includes(searchValue) ||
      t.status.toLowerCase().includes(searchValue) ||
      t.assigned.toLowerCase().includes(searchValue);

    return matchesSearch &&
      (!statusFilter.value || t.status === statusFilter.value) &&
      (!priorityFilter.value || t.priority === priorityFilter.value) &&
      (!customerFilter.value || t.customer === customerFilter.value) &&
      (!assignedFilter.value || t.assigned === assignedFilter.value);
  });
}

function renderTickets(){
  const filtered = filteredTickets();
  const start = (currentPage - 1) * rowsPerPage;
  const paged = filtered.slice(start, start + rowsPerPage);

  tableBody.innerHTML = paged.map(t => `
    <tr>
      <td><input type="checkbox" class="row-check"></td>
      <td>${t.id}</td>
      <td>${t.title}<br><span class="tag">${t.tag}</span></td>
      <td>${t.customer}</td>
      <td><span class="pill ${priorityClass(t.priority)}">${t.priority}</span></td>
      <td><span class="pill ${statusClass(t.status)}">${t.status}</span></td>
      <td>${t.assigned}</td>
      <td class="${slaClass(t.sla)}">${t.sla}</td>
      <td>${t.updated}</td>
      <td>
        <button type="button" onclick="openTicket('${t.id}')" style="background:none;border:none;color:white;cursor:pointer;">•••</button>
      </td>
    </tr>
  `).join("");

  updatePagination(filtered.length);
}

function updatePagination(total){
  const pages = document.querySelector(".pages");
  const totalPages = Math.max(1, Math.ceil(total / rowsPerPage));

  let html = `<button onclick="changePage(${Math.max(1,currentPage-1)})">‹</button>`;

  for(let i = 1; i <= totalPages; i++){
    html += `<button class="${i === currentPage ? "active-page" : ""}" onclick="changePage(${i})">${i}</button>`;
  }

  html += `<button onclick="changePage(${Math.min(totalPages,currentPage+1)})">›</button>`;
  pages.innerHTML = html;

  document.querySelector(".pagination span").innerText =
    `Showing ${total === 0 ? 0 : 1} to ${Math.min(rowsPerPage,total)} of ${total} tickets`;
}

function changePage(page){
  currentPage = page;
  renderTickets();
}

function openTicket(id){
  const t = tickets.find(x => x.id === id);
  alert(`${t.id}\n\n${t.title}\nCustomer: ${t.customer}\nPriority: ${t.priority}\nStatus: ${t.status}\nAssigned To: ${t.assigned}\nSLA: ${t.sla}`);
}

function exportTickets(){
  const rows = [
    ["Ticket ID","Title","Customer","Priority","Status","Assigned To","SLA","Updated"],
    ...filteredTickets().map(t => [t.id,t.title,t.customer,t.priority,t.status,t.assigned,t.sla,t.updated])
  ];

  const csv = rows.map(row => row.map(v => `"${String(v).replaceAll('"','""')}"`).join(",")).join("\n");
  const blob = new Blob([csv], { type:"text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");

  a.href = url;
  a.download = "cyberbench-tickets.csv";
  a.click();

  URL.revokeObjectURL(url);
}

function createNewTicket(){
  const title = prompt("Enter ticket title:");
  if(!title) return;

  tickets.unshift({
    id:`TKT-${String(125 + tickets.length).padStart(6,"0")}`,
    title,
    tag:"Manual",
    customer:"New Customer",
    priority:"Medium",
    status:"Open",
    assigned:"Unassigned",
    sla:"2d left",
    updated:"Just now"
  });

  currentPage = 1;
  renderTickets();
}

function resetFilters(){
  topSearch.value = "";
  tableSearch.value = "";
  statusFilter.value = "";
  priorityFilter.value = "";
  customerFilter.value = "";
  assignedFilter.value = "";
  currentPage = 1;
  renderTickets();
}

topSearch.addEventListener("input", () => {
  tableSearch.value = topSearch.value;
  currentPage = 1;
  renderTickets();
});

tableSearch.addEventListener("input", () => {
  currentPage = 1;
  renderTickets();
});

[statusFilter, priorityFilter, customerFilter, assignedFilter].forEach(filter => {
  filter.addEventListener("change", () => {
    currentPage = 1;
    renderTickets();
  });
});

document.querySelector(".new-btn").addEventListener("click", createNewTicket);

document.querySelectorAll(".filters button").forEach(btn => {
  if(btn.innerText.includes("Export")) btn.addEventListener("click", exportTickets);
  if(btn.innerText.includes("More Filters")) btn.addEventListener("click", resetFilters);
});

populateFilters();
renderTickets();
</script>
