<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Portal | CyberBench</title>

  <link rel="stylesheet" href="/styles.css" />

  <style>

    html,
    body{
      margin:0;
      min-height:100%;
      font-family:Inter, sans-serif;

      background:
        radial-gradient(circle at top left, rgba(45,85,255,.18), transparent 32%),
        radial-gradient(circle at bottom right, rgba(0,140,255,.10), transparent 30%),
        #050816;

      background-attachment:fixed;
      color:#f3f6ff;
    }

    /* ===== MAIN ===== */

    .cbp-main{
      padding:80px 0 100px;
    }

    .cbp-container{
      width:min(1400px, 92%);
      margin:0 auto;
    }

    /* ===== GRID ===== */

    .cbp-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(420px,1fr));
      gap:28px;
      align-items:start;
    }

    /* ===== CARDS ===== */

    .cbp-card{
      background:
        linear-gradient(
          180deg,
          rgba(16,22,36,.94) 0%,
          rgba(8,12,22,.98) 100%
        );

      border:1px solid rgba(255,255,255,.07);
      border-radius:28px;
      padding:36px;

      backdrop-filter:blur(12px);

      box-shadow:
        0 10px 40px rgba(0,0,0,.35),
        inset 0 1px 0 rgba(255,255,255,.03);
    }

    .cbp-card-head{
      margin-bottom:30px;
    }

    .cbp-card-kicker{
      font-size:13px;
      font-weight:700;
      letter-spacing:.18em;
      color:#4d7cff;
      margin-bottom:16px;
    }

    .cbp-h2{
      font-size:42px;
      line-height:1.05;
      font-weight:800;
      letter-spacing:-1px;
      margin:0 0 14px;
    }

    .cbp-muted{
      color:rgba(255,255,255,.72);
      line-height:1.7;
      font-size:17px;
      max-width:60ch;
    }

    /* ===== FORM ===== */

    .cbp-form{
      display:flex;
      flex-direction:column;
      gap:22px;
    }

    .cbp-field{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .cbp-label{
      font-size:13px;
      font-weight:700;
      letter-spacing:.12em;
      color:#dbe3ff;
    }

    .cbp-input{
      height:64px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.08);

      background:rgba(4,7,18,.9);
      color:#fff;

      padding:0 18px;
      font-size:16px;
      outline:none;
    }

    .cbp-input:focus{
      border-color:#4d7cff;
      box-shadow:0 0 0 4px rgba(77,124,255,.14);
    }

    .cbp-form-actions{
      display:flex;
      gap:14px;
      flex-wrap:wrap;
      margin-top:6px;
    }

    .cbp-note{
      margin-top:10px;

      background:rgba(255,255,255,.02);
      border:1px solid rgba(255,255,255,.05);

      border-radius:18px;
      padding:18px;

      color:rgba(255,255,255,.72);
      line-height:1.6;
    }

    /* ===== KPI ===== */

    .cbp-kpi-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:18px;
    }

    .cbp-kpi{
      background:rgba(6,10,22,.82);

      border:1px solid rgba(255,255,255,.06);
      border-radius:20px;

      padding:24px;
      min-height:120px;

      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }

    .cbp-kpi div:first-child{
      color:rgba(255,255,255,.72);
      font-size:15px;
    }

    .cbp-kpi div:last-child{
      font-size:40px;
      font-weight:800;
      letter-spacing:-1px;
    }

    /* ===== BUTTONS ===== */

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;

      height:54px;
      padding:0 24px;

      border-radius:18px;
      text-decoration:none;
      font-weight:700;
      border:none;
      cursor:pointer;
    }

    .btn-primary{
      background:linear-gradient(135deg,#4d7cff,#5a6dff);
      color:white;

      box-shadow:
        0 0 30px rgba(77,124,255,.35);
    }

    .btn-ghost{
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.03);
      color:#fff;
    }

   <!-- ========== FOOTER ========== -->

<footer class="footer">

  <div class="container">

    <div class="footer-top">

      <!-- Logo -->

      <a
        href="/index.html"
        class="footer-logo"
        aria-label="CyberBench homepage"
      >
        <span class="logo" aria-hidden="true"></span>
        <span>CyberBench</span>
      </a>

      <!-- Navigation -->

      <nav class="footer-nav">

        <a href="/services.html">Services</a>
        <a href="/about.html">About</a>
        <a href="/blog.html">Blog</a>
        <a href="/client-portal.html">Client Portal</a>
        <a href="/consultant-portal.html">Consultant Portal</a>

      </nav>

    </div>

    <!-- Footer Bottom -->

    <div class="footer-bottom-wrap">

      <div class="footer-copy-text">
        Enterprise cybersecurity operations delivered through
        fast execution, measurable outcomes,
        and vetted cybersecurity specialists.
      </div>

      <div class="footer-contact">
        <span>Support</span>
        <a href="mailto:support@cyberbench.io">
          support@cyberbench.io
        </a>
      </div>

      <div class="footer-bottom">
        © <span id="year"></span> CyberBench.
        All rights reserved.
      </div>

    </div>

  </div>

</footer>

<script>
  document.getElementById("year").textContent =
    new Date().getFullYear();
</script>

<!-- ===== CyberBench AI Chat Widget ===== -->

<button
  class="cb-chat-fab"
  id="cbChatFab"
  aria-label="Open CyberBench AI chat"
>
  AI
</button>

<div class="cb-chat" id="cbChat" aria-hidden="true">

  <div class="cb-chat-header">

    <div class="cb-chat-title">

      <div class="cb-chat-dot"></div>

      <div>
        <div class="cb-chat-name">
          CyberBench AI
        </div>

        <div class="cb-chat-sub">
          Fast triage • How-to • Guidance
        </div>
      </div>

    </div>

    <button
      class="cb-chat-close"
      id="cbChatClose"
      aria-label="Close chat"
    >
      ✕
    </button>

  </div>

  <div class="cb-chat-body" id="cbChatBody"></div>

  <form class="cb-chat-form" id="cbChatForm">

    <input
      class="cb-chat-input"
      id="cbChatInput"
      placeholder="Ask about tickets, KPIs, services, or next steps…"
      autocomplete="off"
      required
    />

    <button class="cb-chat-send" type="submit">
      Send
    </button>

  </form>

  <div class="cb-chat-footnote">
    Demo widget. Don’t paste secrets.
  </div>

</div>

<script>

(function () {

  const fab = document.getElementById("cbChatFab");
  const box = document.getElementById("cbChat");
  const close = document.getElementById("cbChatClose");
  const body = document.getElementById("cbChatBody");
  const form = document.getElementById("cbChatForm");
  const input = document.getElementById("cbChatInput");

  const escapeHtml = (s) =>
    String(s).replace(/[&<>"']/g, (m) => ({
      "&":"&amp;",
      "<":"&lt;",
      ">":"&gt;",
      '"':"&quot;",
      "'":"&#39;"
    }[m]));

  function addMsg(role, text) {

    const row = document.createElement("div");

    row.className =
      "cb-chat-row " +
      (role === "user" ? "is-user" : "is-ai");

    row.innerHTML =
      `<div class="cb-chat-bubble">
        ${escapeHtml(text)}
      </div>`;

    body.appendChild(row);

    body.scrollTop = body.scrollHeight;
  }

  function setOpen(isOpen) {

    box.style.display =
      isOpen ? "flex" : "none";

    box.setAttribute(
      "aria-hidden",
      isOpen ? "false" : "true"
    );

    if (isOpen) input.focus();
  }

  fab.addEventListener("click", () => {

    setOpen(true);

    if (!body.dataset.greeted) {

      addMsg(
        "ai",
        "Hi — I’m CyberBench AI. Tell me what you need help with (ticket submission, KPIs, services, or triage)."
      );

      body.dataset.greeted = "1";
    }

  });

  close.addEventListener(
    "click",
    () => setOpen(false)
  );

  form.addEventListener("submit", async (e) => {

    e.preventDefault();

    const text = input.value.trim();

    if (!text) return;

    addMsg("user", text);

    input.value = "";

    addMsg("ai", "Typing…");

    const loadingNode =
      body.lastElementChild;

    try {

      const r = await fetch("/api/chat", {

        method: "POST",

        headers: {
          "Content-Type": "application/json"
        },

        body: JSON.stringify({
          message: text
        })

      });

      const data = await r.json();

      const reply =
        data.reply || "No response.";

      loadingNode.querySelector(
        ".cb-chat-bubble"
      ).textContent = reply;

    } catch (err) {

      loadingNode.querySelector(
        ".cb-chat-bubble"
      ).textContent =
        "Chat service is offline. Start your server and try again.";
    }

  });

  setOpen(false);

})();

</script>

</body>
</html>
